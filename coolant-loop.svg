<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <!-- Coolant loop piping around the edges -->
  <path d="M 100 50 H 1100 Q 1150 50 1150 100 V 700 Q 1150 750 1100 750 H 100 Q 50 750 50 700 V 100 Q 50 50 100 50 Z" 
        stroke="url(#pipeGradient)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
  
  <!-- Inner pipe (double-wall effect) -->
  <path d="M 100 50 H 1100 Q 1150 50 1150 100 V 700 Q 1150 750 1100 750 H 100 Q 50 750 50 700 V 100 Q 50 50 100 50 Z" 
        stroke="url(#coolantGradient)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Animated coolant flow dots -->
  <circle r="4" fill="#4fc3f7" opacity="0.9">
    <animateMotion dur="8s" repeatCount="indefinite" 
      path="M 100 50 H 1100 Q 1150 50 1150 100 V 700 Q 1150 750 1100 750 H 100 Q 50 750 50 700 V 100 Q 50 50 100 50 Z"/>
  </circle>
  <circle r="4" fill="#4fc3f7" opacity="0.9">
    <animateMotion dur="8s" repeatCount="indefinite" begin="2s"
      path="M 100 50 H 1100 Q 1150 50 1150 100 V 700 Q 1150 750 1100 750 H 100 Q 50 750 50 700 V 100 Q 50 50 100 50 Z"/>
  </circle>
  <circle r="4" fill="#4fc3f7" opacity="0.9">
    <animateMotion dur="8s" repeatCount="indefinite" begin="4s"
      path="M 100 50 H 1100 Q 1150 50 1150 100 V 700 Q 1150 750 1100 750 H 100 Q 50 750 50 700 V 100 Q 50 50 100 50 Z"/>
  </circle>
  <circle r="3" fill="#81d4fa" opacity="0.7">
    <animateMotion dur="8s" repeatCount="indefinite" begin="6s"
      path="M 100 50 H 1100 Q 1150 50 1150 100 V 700 Q 1150 750 1100 750 H 100 Q 50 750 50 700 V 100 Q 50 50 100 50 Z"/>
  </circle>

  <!-- Cold Plate (bottom center) -->
  <rect x="480" y="720" width="240" height="50" rx="6" fill="#1a2a3a" stroke="#3a7bd5" stroke-width="2" opacity="0.8"/>
  <line x1="510" y1="730" x2="510" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <line x1="540" y1="730" x2="540" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <line x1="570" y1="730" x2="570" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <line x1="600" y1="730" x2="600" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <line x1="630" y1="730" x2="630" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <line x1="660" y1="730" x2="660" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <line x1="690" y1="730" x2="690" y2="760" stroke="#2a5a8a" stroke-width="1.5" opacity="0.6"/>
  <text x="600" y="785" text-anchor="middle" fill="#9da5b4" font-size="11" font-family="Arial">COLD PLATE</text>

  <!-- Chiller (top right) -->
  <rect x="1050" y="80" width="70" height="90" rx="8" fill="#1a2a3a" stroke="#3a7bd5" stroke-width="2" opacity="0.8"/>
  <!-- Fan blades -->
  <circle cx="1085" cy="115" r="18" fill="none" stroke="#4a8abf" stroke-width="1.5" opacity="0.6"/>
  <line x1="1085" y1="100" x2="1085" y2="130" stroke="#4a8abf" stroke-width="1.5" opacity="0.5"/>
  <line x1="1070" y1="115" x2="1100" y2="115" stroke="#4a8abf" stroke-width="1.5" opacity="0.5"/>
  <line x1="1074" y1="104" x2="1096" y2="126" stroke="#4a8abf" stroke-width="1.5" opacity="0.5"/>
  <line x1="1096" y1="104" x2="1074" y2="126" stroke="#4a8abf" stroke-width="1.5" opacity="0.5"/>
  <!-- Fins -->
  <line x1="1055" y1="140" x2="1115" y2="140" stroke="#2a5a8a" stroke-width="1" opacity="0.5"/>
  <line x1="1055" y1="148" x2="1115" y2="148" stroke="#2a5a8a" stroke-width="1" opacity="0.5"/>
  <line x1="1055" y1="156" x2="1115" y2="156" stroke="#2a5a8a" stroke-width="1" opacity="0.5"/>
  <text x="1085" y="185" text-anchor="middle" fill="#9da5b4" font-size="11" font-family="Arial">CHILLER</text>

  <!-- Pump (left side) -->
  <circle cx="60" cy="400" r="22" fill="#1a2a3a" stroke="#3a7bd5" stroke-width="2" opacity="0.8"/>
  <polygon points="60,385 72,400 60,415 48,400" fill="#4a8abf" opacity="0.6"/>
  <text x="60" y="435" text-anchor="middle" fill="#9da5b4" font-size="11" font-family="Arial">PUMP</text>

  <!-- Flow direction arrows along pipe -->
  <polygon points="600,42 608,47 600,52" fill="#4fc3f7" opacity="0.5"/>
  <polygon points="1158,400 1153,392 1148,400" fill="#4fc3f7" opacity="0.5" transform="rotate(90,1153,396)"/>
  <polygon points="600,758 592,753 600,748" fill="#4fc3f7" opacity="0.5"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5f"/>
      <stop offset="50%" stop-color="#2a5a8a"/>
      <stop offset="100%" stop-color="#1a3a5f"/>
    </linearGradient>
    <linearGradient id="coolantGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#81d4fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
